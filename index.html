<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器</title>
    <!-- 本地资源 -->
    <link href="css/tailwind.css" rel="stylesheet">
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <script src="js/qrcode.js"></script>
    <!-- 自定义样式 -->
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #64748b;
            --background-color: #f9fafb;
            --card-background: #ffffff;
            --text-color: #111827;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* 通用样式 */
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        /* 输入框样式 */
        .input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 卡片样式 */
        .card {
            background-color: var(--card-background);
            border-radius: 0.5rem;
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
        }

        /* 标签页样式 */
        .tab-btn {
            position: relative;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .btn {
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }
            
            .input {
                padding: 0.75rem;
                font-size: 1rem;
            }
            
            .card {
                padding: 1.25rem;
            }
        }

        /* 历史记录项样式 */
        .history-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            transition: all 0.2s ease-in-out;
        }

        .history-item:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-color);
        }

        .history-item img {
            width: 4rem;
            height: 4rem;
            object-fit: contain;
        }

        .history-item .history-info {
            flex: 1;
        }

        .history-item .history-type {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .history-item .history-content {
            font-size: 0.875rem;
            color: var(--secondary-color);
            margin-bottom: 0.25rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .history-item .history-time {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* 工具类 */
        .text-primary {
            color: var(--primary-color);
        }

        .bg-primary {
            background-color: var(--primary-color);
        }

        .shadow-sm {
            box-shadow: var(--shadow-sm);
        }

        .shadow-md {
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>


    <div class="min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <header class="bg-white shadow-sm">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-grow container mx-auto px-4 py-8">
            <!-- 文本转换区 -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 文本转换表单 -->
                <div class="lg:col-span-2">
                    <div class="card">
                        <!-- 二维码预览 -->
                        <div id="qr-preview" class="mb-4 flex items-center justify-center" style="width: 192px; height: 192px; box-sizing: border-box; border: 1px solid #e5e7eb; border-radius: 0.375rem; background-color: white;">
                            <!-- 空状态时显示空白 -->
                        </div>
                        
                        <!-- 文本二维码表单 -->
                        <div class="mb-4">
                            <textarea id="text-content" class="input h-32 resize-none" placeholder="请输入要转换为二维码的文本"></textarea>
                        </div>

                        <!-- 生成按钮和提示 -->
                        <div class="relative">
                            <button id="generate-btn" class="btn btn-primary w-full py-3 text-lg font-medium">
                                生成二维码
                            </button>
                            <div id="error-message" class="hidden absolute top-0 right-0 transform translate-x-2 -translate-y-1/2 bg-red-100 text-red-600 px-4 py-2 rounded-md text-sm shadow-md">
                                文本内容过长
                            </div>
                            <div id="info-message" class="hidden absolute top-0 right-0 transform translate-x-2 -translate-y-1/2 bg-blue-100 text-blue-600 px-4 py-2 rounded-md text-sm shadow-md">
                                操作成功
                            </div>
                            <div id="warning-message" class="hidden absolute top-0 right-0 transform translate-x-2 -translate-y-1/2 bg-yellow-100 text-yellow-600 px-4 py-2 rounded-md text-sm shadow-md">
                                请输入内容
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 历史记录 -->
                <div class="lg:col-span-1">
                    <div class="card">
                        <h2 class="text-xl font-semibold mb-4">历史记录</h2>
                        <div id="history-empty" class="text-center text-gray-500 py-4">
                            暂无历史记录
                        </div>
                        <div id="history-list" class="space-y-4 hidden">
                            <!-- 历史记录将通过JavaScript动态添加 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="bg-white shadow-sm mt-8">
            <div class="container mx-auto px-4 py-4 text-center text-gray-500 text-sm">
                <p>© 2026 二维码生成器 | lishx8888版权所有</p>
            </div>
        </footer>
    </div>

    <!-- 主逻辑 -->
    <script>
        // DOM元素
        const generateBtn = document.getElementById('generate-btn');
        const qrPreview = document.getElementById('qr-preview');
        const historyEmpty = document.getElementById('history-empty');
        const historyList = document.getElementById('history-list');
        const errorMessage = document.getElementById('error-message');
        const infoMessage = document.getElementById('info-message');
        const warningMessage = document.getElementById('warning-message');

        // 隐藏所有提示
        function hideAllMessages() {
            errorMessage.classList.add('hidden');
            infoMessage.classList.add('hidden');
            warningMessage.classList.add('hidden');
        }

        // 显示错误提示
        function showError(message) {
            hideAllMessages();
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            // 3秒后自动隐藏
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 3000);
        }

        // 显示信息提示
        function showInfo(message) {
            hideAllMessages();
            infoMessage.textContent = message;
            infoMessage.classList.remove('hidden');
            // 3秒后自动隐藏
            setTimeout(() => {
                infoMessage.classList.add('hidden');
            }, 3000);
        }

        // 显示警告提示
        function showWarning(message) {
            hideAllMessages();
            warningMessage.textContent = message;
            warningMessage.classList.remove('hidden');
            // 3秒后自动隐藏
            setTimeout(() => {
                warningMessage.classList.add('hidden');
            }, 3000);
        }

        // 当前生成的二维码
        let currentQRCode = '';

        // 初始化历史记录
        let history = JSON.parse(localStorage.getItem('qrCodeHistory') || '[]');
        updateHistory();



        // 生成二维码
        generateBtn.addEventListener('click', async () => {
            try {
                let content = '';
                const type = 'text';

                // 只处理文本类型
                content = document.getElementById('text-content').value.trim();

                if (!content) {
                    showWarning('请输入内容');
                    return;
                }

                // 检查文本长度，QR码有容量限制
                if (content.length > 200) {
                    showError('文本内容过长，请减少字数（建议不超过200字）');
                    generateBtn.innerHTML = '生成二维码';
                    generateBtn.disabled = false;
                    return;
                }

                // 计算实际编码长度（考虑中文字符）
                let encodedLength = 0;
                for (let i = 0; i < content.length; i++) {
                    const charCode = content.charCodeAt(i);
                    if (charCode > 127) {
                        // 中文字符占用更多空间
                        encodedLength += 3;
                    } else {
                        // 英文字符占用较少空间
                        encodedLength += 1;
                    }
                }

                // 检查编码后的长度
                if (encodedLength > 800) {
                    showError('文本内容过长，请减少字数（建议不超过150字）');
                    generateBtn.innerHTML = '生成二维码';
                    generateBtn.disabled = false;
                    return;
                }

                // 显示加载状态
                generateBtn.innerHTML = '<span class="loading mr-2"></span>生成中...';
                generateBtn.disabled = true;

                // 生成二维码
                const tempDiv = document.createElement('div');
                tempDiv.style.display = 'none';
                document.body.appendChild(tempDiv);
                
                const qr = new QRCode(tempDiv, {
                    text: content,
                    width: 192,
                    height: 192,
                    colorDark: '#000000',
                    colorLight: '#FFFFFF',
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                // 等待二维码生成完成
                setTimeout(() => {
                    const img = tempDiv.querySelector('img');
                    const canvas = document.createElement('canvas');
                    canvas.width = 192;
                    canvas.height = 192;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    // 转换为base64
                    currentQRCode = canvas.toDataURL('image/png');
                    
                    // 更新预览
                    qrPreview.innerHTML = `<img src="${currentQRCode}" alt="二维码" class="w-48 h-48 object-cover rounded-md">`;
                    

                    
                    // 添加到历史记录
                    const historyItem = {
                        type: '文本二维码',
                        content: content,
                        qrCode: currentQRCode,
                        timestamp: new Date().toLocaleString()
                    };
                    
                    history.unshift(historyItem);
                if (history.length > 3) {
                    history = history.slice(0, 3);
                }
                    
                    // 保存历史记录
                    localStorage.setItem('qrCodeHistory', JSON.stringify(history));
                    updateHistory();
                    
                    // 清理临时元素
                    document.body.removeChild(tempDiv);
                    
                    // 恢复按钮状态
                    generateBtn.innerHTML = '生成二维码';
                    generateBtn.disabled = false;
                }, 100);
                
                return;
            } catch (error) {
                console.error('生成二维码失败:', error);
                showError('生成二维码失败，请重试');
                generateBtn.innerHTML = '生成二维码';
                generateBtn.disabled = false;
            }
        });



        // 更新历史记录
        function updateHistory() {
            if (history.length === 0) {
                historyEmpty.classList.remove('hidden');
                historyList.classList.add('hidden');
                return;
            }

            historyEmpty.classList.add('hidden');
            historyList.classList.remove('hidden');

            historyList.innerHTML = '';
            history.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <img src="${item.qrCode}" alt="二维码">
                    <div class="history-info">
                        <div class="history-type">${item.type}</div>
                        <div class="history-content">${item.content}</div>
                        <div class="history-time">${item.timestamp}</div>
                    </div>
                `;
                historyList.appendChild(historyItem);
            });



            // 绑定历史记录点击事件
            document.querySelectorAll('.history-item').forEach((item, index) => {
                item.addEventListener('click', () => {
                    const historyItem = history[index];
                    // 填充文本内容
                    document.getElementById('text-content').value = historyItem.content;
                    // 显示二维码
                    qrPreview.innerHTML = `<img src="${historyItem.qrCode}" alt="二维码" class="rounded-md">`;
                });
            });
        }
    </script>
</body>
</html>
